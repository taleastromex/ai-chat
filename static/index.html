<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI-FABLE</title>
  <link rel="stylesheet" href="/static/css/base.css" />
  <link rel="stylesheet" href="/static/css/chat.css" />
  <script src="/static/marked.min.js"></script>
  <script src="/static/js/chat.js" defer></script>
</head>
<body>
<div class="shell">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">🧠</div>
      <div>
        <div class="logo-text">AI-FABLE</div>
        <div class="logo-sub">Gemma-4 12B · Coder</div>
      </div>
    </div>

    <button id="newChatBtn" class="new-chat-btn">
      <span>＋</span> New chat
    </button>

    <div>
      <div class="section-title" style="margin-bottom:8px">Chats</div>
      <div class="chat-list" id="chatList">
        <div class="chat-list-empty">No chats yet</div>
      </div>
    </div>

    <div class="status-bar" id="statusBar">
      <div class="status-row">
        <span class="status-label">Server</span>
        <span class="badge badge-yellow" id="serverBadge">Connecting…</span>
      </div>
      <div class="status-row">
        <span class="status-label">Model</span>
        <span class="badge badge-muted" id="modelBadge">—</span>
      </div>
      <div class="status-row">
        <span class="status-label">Backend</span>
        <span class="badge badge-muted" id="deviceBadge">Ollama</span>
      </div>
      <div class="status-row">
        <span class="status-label">Quant</span>
        <span class="badge badge-muted" id="quantBadge">—</span>
      </div>
    </div>

    <div class="section-title">Parameters</div>

    <div class="settings">
      <div>
        <div class="range-row">
          <label for="maxTokens">Max new tokens</label>
          <span class="range-val" id="maxTokensVal">512</span>
        </div>
        <input type="range" id="maxTokens" min="64" max="4096" step="64" value="512" />
      </div>

      <div>
        <div class="range-row">
          <label for="temperature">Temperature</label>
          <span class="range-val" id="tempVal">0.7</span>
        </div>
        <input type="range" id="temperature" min="0" max="2" step="0.05" value="0.7" />
      </div>

      <div>
        <div class="range-row">
          <label for="topP">Top-p</label>
          <span class="range-val" id="topPVal">0.90</span>
        </div>
        <input type="range" id="topP" min="0.01" max="1" step="0.01" value="0.9" />
      </div>

      <div>
        <label for="systemPrompt">System prompt</label>
        <textarea id="systemPrompt" class="system-prompt-input" rows="3"
          placeholder="Optional system instructions…"></textarea>
      </div>

      <div class="toggle-row">
        <label style="margin:0">Sampling</label>
        <label class="toggle">
          <input type="checkbox" id="doSample" checked />
          <span class="toggle-track"></span>
        </label>
      </div>
    </div>

  </aside>

  <!-- ── Main ── -->
  <main class="main">
    <div class="chat-area" id="chatArea">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">✦</div>
        <div class="empty-title">AI-FABLE is ready</div>
        <div class="empty-sub">Ask anything — code, reasoning, or drop an image for multimodal analysis.</div>
      </div>
    </div>

    <!-- Image preview strip -->
    <div class="image-preview-wrap" id="imagePreviewWrap">
      <img id="imageThumb" class="image-thumb" src="" alt="attached image" />
      <button id="removeImgBtn" class="remove-img" title="Remove image">✕</button>
      <span id="imageFileName" class="image-filename"></span>
    </div>

    <!-- Input bar -->
    <div class="input-bar">
      <div class="input-row">
        <input type="file" id="fileInput" accept="image/*" style="display:none" />
        <button id="attachBtn" class="attach-btn" title="Attach image">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </button>

        <textarea id="promptInput" placeholder="Ask anything…" rows="1"></textarea>

        <button id="sendBtn" class="send-btn" title="Send (Enter)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="input-hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line &nbsp;·&nbsp; 📎 to attach an image</div>
    </div>
  </main>

</div>
</body>
</html>
